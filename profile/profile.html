<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <script src="../theme-loader.js"></script>
    <title>Профиль пользователя</title>
</head>
<body class="search-page-body"> <div class="login-glow"></div> 

    <div class="app-container">
        <aside class="sidebar">
            <a href="../search/search.html" style="text-decoration: none;">
                <div class="icon"><img src="../img/search.png" alt="Назад"></div>
            </a>
            <a href="../top/top.html" class="sidebar-link">
                <div class="icon profile-icon">
                    <img src="../img/stats.png" alt="ТОП">
                </div>
            </a> 
            <a href="../settings/settings.html" class="sidebar-link">
                <div class="icon profile-icon">
                    <img src="../img/settings.png" alt="Настройки">
                </div>
            </a>
        </aside>

        <main class="main-content glass-panel">
            <div id="profileView">
                <header class="profile-header-visual">
                    <div class="profile-cover"></div>
                    
                    <div class="profile-main-info">
                        <div class="avatar-container">
                            <div class="profile-avatar-wrapper">
                                <img src="../img/user.png" alt="Аватар" id="displayAvatar">
                            </div>
                            <button class="edit-badge" id="openEditBtn">
                                <img src="../img/settings.png" alt="Edit">
                            </button>
                        </div>

                        <div class="profile-text-data">
                            <h2 class="user-nickname" id="displayNickname">@USER123</h2>
                            <p class="user-role-label" id="displayRole">Программист</p>
                        </div>
                    </div>
                </header>

                <h3 class="section-title">РАБОТЫ</h3>
                <section class="gallery-grid">
                    <div class="card-modern">
                        <div class="image-wrapper">
                            <div class="image-placeholder"></div>
                        </div>
                    </div>
                    <div class="card-modern"><div class="image-wrapper"><div class="image-placeholder"></div></div></div>
                    <div class="card-modern"><div class="image-wrapper"><div class="image-placeholder"></div></div></div>
                
        </main>
    </div>

    <div class="login-glow"></div> 

    <div class="app-container">
        </div>
    <div class="modal-overlay" id="profileEditModal" style="display: none;">
        <div class="modal-glass-card">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            
            <div class="login-header">
                <h2>РЕДАКТИРОВАНИЕ</h2>
                <p>Обновите свои данные</p>
            </div>
            
            <form id="editProfileForm">
                <div class="edit-avatar-section">
                    <div class="profile-avatar-wrapper modal-avatar">
                        <img src="../img/user.png" alt="Превью" id="editAvatarPreview">
                    </div>
                    <label for="avatarUpload" class="button-modern secondary-button upload-btn">
                        СМЕНИТЬ ФОТО
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                </div>

                <div class="input-group">
                    <div class="input-modern">
                        <img src="../img/user.png" alt="" class="input-icon">
                        <input type="text" id="editNickname" placeholder="Новый логин (@USER123)">
                    </div>
                    
                    <div class="input-modern password-field">
                        <img src="../img/lock.png" alt="" class="input-icon">
                        <input type="password" id="editPass" placeholder="Новый пароль (мин. 8 знаков)">
                    </div>

                    <div class="input-modern password-field">
                        <img src="../img/lock.png" alt="" class="input-icon">
                        <input type="password" id="editPassConfirm" placeholder="Повторите пароль">
                    </div>
                </div>
                
                <div class="action-buttons vertical-buttons modal-actions">
                    <button type="submit" class="button-modern submit-button">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                </div>
            </form>
        </div>
    </div>
    <script src="../auth.js"></script>
</body>
</html>
