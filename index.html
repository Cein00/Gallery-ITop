<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Вход — GALLERYITOP</title>
</head>
<body class="login-body">
    <main class="login-wrapper">
        <form class="login-card">
            <div class="login-header">
                <h2>ВХОД В GALLERYITOP</h2>
            </div>
            
            <div class="input-group">
                <div class="input-oval">
                    <input type="text" placeholder="Имя пользователя" required>
                </div>
                <div class="input-oval">
                    <input type="password" placeholder="Пароль" required>
                </div>
            </div>
            
            <div class="action-buttons">
                <a href="search/search.html" class="button-oval submit-button">ВОЙТИ</a>
                
                <a href="register.html" class="button-oval secondary-button">РЕГИСТРАЦИЯ</a>
            </div>
        </form>
    </main>
</body>
</html>
