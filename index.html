<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Вход — GALLERYITOP</title>
</head>
<body class="login-body">
    <div class="login-glow"></div> <main class="login-wrapper">
        <form class="login-card" id="loginForm">
            <div class="login-header">
                <h2>ВХОД В GALLERYITOP</h2>
                <p>Добро пожаловать обратно!</p>
            </div>
            
            <div class="input-group">
                <div class="input-modern">
                    <img src="img/user.png" alt="" class="input-icon">
                    <input type="text" id="loginInput" placeholder="Имя пользователя" required>
                </div>
                
                <div class="input-modern password-field">
                    <img src="img/lock.png" alt="" class="input-icon">
                    <input type="password" id="passInput" placeholder="Пароль" required>
                </div>
            </div>
            
            <div class="action-buttons vertical-buttons">
                <button type="submit" class="button-modern submit-button">ВОЙТИ</button>
                <a href="registration/registration.html" class="button-link">Нет аккаунта? Регистрация</a>
            </div>
        </form>
    </main>
    
    <script src="auth.js"></script>
</body>
</html>
